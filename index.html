<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#0B0B0C" />

    <title>MARZ - Fullstack Developer</title>
    <meta
      name="description"
      content="Marz - a 24-year-old fullstack developer. I build software that ships, scales & stays out of the way."
    />
    <meta name="author" content="Mar Zallan Ismail" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://marzallan.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marzallan.com/" />
    <meta property="og:site_name" content="MARZ - Mar Zallan Ismail" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="MARZ - Fullstack Developer" />
    <meta
      property="og:description"
      content="Marz - a 24-year-old fullstack developer. I build software that ships, scales & stays out of the way."
    />
    <!-- Social preview = the human cartoon portrait (absolute URL for X/LinkedIn). -->
    <meta property="og:image" content="https://marzallan.com/marz_human.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1086" />
    <meta property="og:image:height" content="1448" />
    <meta property="og:image:alt" content="Cartoon portrait of Marz (Mar Zallan Ismail)" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MARZ - Fullstack Developer" />
    <meta
      name="twitter:description"
      content="I build software that ships, scales & stays out of the way."
    />
    <meta name="twitter:image" content="https://marzallan.com/marz_human.png" />
    <meta name="twitter:image:alt" content="Cartoon portrait of Marz (Mar Zallan Ismail)" />

    <!-- Fonts: loaded here (instead of @import in CSS) for performance. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Only the weights actually used in the app are requested. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@600;700&family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
